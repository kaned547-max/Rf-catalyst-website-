<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3;url=/" />
  <title>RF Catalyst Automotive — Page Not Found</title>
  <style>
    :root{--bg:#0A0E14;--cyan:#00E5FF;--text:#8A9BB0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
    .code{font-size:4rem;color:var(--cyan);font-family:'Orbitron',sans-serif;font-weight:900;margin-bottom:1rem}
    .msg{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}
    .redir{font-size:.65rem;color:#4A5A6E;letter-spacing:.1em}
    a{color:var(--cyan);text-decoration:none}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=DM+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div>
    <div class="code">404</div>
    <p class="msg">Page Not Found</p>
    <p class="redir">Redirecting to <a href="/">rfcatalyst.com</a> in 3 seconds</p>
  </div>
</body>
</html>
